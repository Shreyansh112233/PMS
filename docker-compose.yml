version: '3.8'

services:
  app:
    build: .
    container_name: pms_app
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env.docker

  postgres:
    image: postgres:16-alpine
    container_name: PMS_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: